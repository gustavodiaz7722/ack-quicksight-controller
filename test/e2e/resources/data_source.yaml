apiVersion: quicksight.services.k8s.aws/v1alpha1
kind: DataSource
metadata:
  name: $DATA_SOURCE_NAME
spec:
  awsAccountID: "$AWS_ACCOUNT_ID"
  id: $DATA_SOURCE_ID
  name: $DATA_SOURCE_NAME
  type: $DATA_SOURCE_TYPE
  parameters:
    s3Parameters:
      manifestFileLocation:
        bucket: $S3_BUCKET_NAME
        key: $S3_MANIFEST_KEY
      roleARN: $ROLE_ARN
  tags:
    - key: environment
      value: test
